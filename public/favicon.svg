<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="6" fill="#0a0a1e" fill-opacity=".92"/>
  <rect x=".5" y=".5" width="31" height="31" rx="6" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
  <!-- ring edges connecting 5 GPU nodes in pentagon -->
  <polygon points="16,5 26.5,12.6 22.5,24.4 9.5,24.4 5.5,12.6"
           fill="none" stroke="rgba(255,255,255,.15)" stroke-width=".7"/>
  <!-- GPU nodes -->
  <circle cx="16"   cy="5"    r="2.8" fill="#4488ff"/>
  <circle cx="26.5" cy="12.6" r="2.8" fill="#4488ff"/>
  <circle cx="22.5" cy="24.4" r="2.8" fill="#ffd700"/>
  <circle cx="9.5"  cy="24.4" r="2.8" fill="#ffd700"/>
  <circle cx="5.5"  cy="12.6" r="2.8" fill="#4488ff"/>
  <!-- data blob in transit -->
  <circle cx="21.5" cy="8.5" r="1.6" fill="#ff6b6b" opacity=".85">
    <animate attributeName="opacity" values=".85;.4;.85" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="7.2" cy="19" r="1.6" fill="#51cf66" opacity=".85">
    <animate attributeName="opacity" values=".85;.4;.85" dur="2s" repeatCount="indefinite" begin=".7s"/>
  </circle>
</svg>
